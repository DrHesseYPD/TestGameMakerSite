<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Wrapper</title>
	<style>
	html, body {
	  margin: 0;
	  padding: 0;
	  height: 100%;
	  overflow: hidden;
	}

	#container {
	  width: 100%;
	  height: 100%;
	  position: relative;
	  overflow: hidden;
	}

	iframe {
	  position: absolute;
	  top: 0;
	  left: 0;
	  border: none;
	  transform-origin: top left;
	}
	</style>

</head>

<body>

<div id="container">
  <iframe id="gameFrame" src="./index.html"></iframe>
</div>


<script>
function resizeGame() {
  const iframe = document.getElementById("gameFrame");
  const container = document.getElementById("container");

  const gameWidth = 1399;
  const gameHeight = 696;

  const containerWidth = container.clientWidth;
  const containerHeight = container.clientHeight;

  const scale = Math.min(
    containerWidth / gameWidth,
    containerHeight / gameHeight
  );

  iframe.style.width = gameWidth + "px";
  iframe.style.height = gameHeight + "px";
  iframe.style.transform = `scale(${scale})`;

  iframe.style.left = ((containerWidth - gameWidth * scale) / 2) + "px";
  iframe.style.top = ((containerHeight - gameHeight * scale) / 2) + "px";
}

window.addEventListener("load", resizeGame);
window.addEventListener("resize", resizeGame);
</script>

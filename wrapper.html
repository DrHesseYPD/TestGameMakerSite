<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Wrapper</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: none;
      transform-origin: top left;
    }
  </style>
</head>

<body>

<div id="container">
  <iframe id="gameFrame" src="./index.html"></iframe>
</div>

<script>
function resizeGame() {
  const iframe = document.getElementById("gameFrame");
  const container = document.getElementById("container");

  // Game's original resolution
  const gameWidth = 1366;
  const gameHeight = 768;

  // ✅ Use container size instead of window
  const containerWidth = container.clientWidth;
  const containerHeight = container.clientHeight;

  // Calculate scale
  const scale = Math.min(
    containerWidth / gameWidth,
    containerHeight / gameHeight
  );

  // Set iframe base size
  iframe.style.width = gameWidth + "px";
  iframe.style.height = gameHeight + "px";

  // Scale it
  iframe.style.transform = `scale(${scale})`;

  // Center it
  iframe.style.left = ((containerWidth - gameWidth * scale) / 2) + "px";
  iframe.style.top = ((containerHeight - gameHeight * scale) / 2) + "px";
}

</body>
</html>
